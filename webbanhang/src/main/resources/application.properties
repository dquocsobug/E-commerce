spring.application.name=webbanhang
server.port=${PORT:8080}
server.servlet.context-path=/api

# =====================================================
# DATABASE
# =====================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Neon SSL (b?t bu?c)
spring.jpa.properties.hibernate.connection.ssl=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =====================================================
# HIKARICP - T?i ?u cho Neon free tier
# =====================================================
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3

# Gi?m xu?ng 10s ?? fail nhanh thay vě treo 30s
spring.datasource.hikari.connection-timeout=10000

# ?óng connection idle sau 3 phút (Neon free có gi?i h?n connections)
spring.datasource.hikari.idle-timeout=180000

# Tái t?o connection sau 10 phút (tránh stale connection t? Neon)
spring.datasource.hikari.max-lifetime=600000

# Ki?m tra connection cňn s?ng tr??c khi důng (quan tr?ng v?i Neon!)
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# =====================================================
# JWT
# =====================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# =====================================================
# LOGGING
# =====================================================
logging.level.com.example.webbanhang=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# =====================================================
# JACKSON
# =====================================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# =====================================================
# ERROR HANDLING
# =====================================================
server.error.include-message=always
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# =====================================================
# ACTUATOR - ?? UptimeRobot ping (ch?ng cold start)
# =====================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator

# =====================================================
# MOMO PAYMENT
# =====================================================
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.partner-code=MOMO
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.redirect-url=${MOMO_REDIRECT_URL}
momo.ipn-url=${MOMO_IPN_URL}

# =====================================================
# GEMINI AI
# =====================================================
gemini.api.key=${GEMINI_API_KEY}
gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent